function cls(v) {
  if (v < 0.3) return "r-tight";
  if (v < 0.6) return "r-narrow";
  if (v < 1.0) return "r-moderate";
  if (v < 1.5) return "r-wide";
  return "r-extreme";
}

function rCls(v) {
  if (v <= 1.1) return "r-tight";
  if (v <= 1.5) return "r-narrow";
  if (v <= 3) return "r-moderate";
  return "r-wide";
}

function r(v) {
  return '<span class="' + rCls(v) + '">' + v.toFixed(2) + '&times;</span>';
}

var sortKey = "rmse_r";
var sortDir = 1;

function render() {
  var sorted = DATA.slice().sort(function(a, b) {
    var va = a[sortKey], vb = b[sortKey];
    return (va > vb ? 1 : va < vb ? -1 : 0) * sortDir;
  });

  var h = "";
  sorted.forEach(function(d) {
    h += '<tr>' +
      '<td style="font-weight:700">' + String(d.task).padStart(3,'0') + '</td>' +
      '<td class="' + cls(d.rmse_r) + '" style="font-weight:700">' + d.rmse_r.toFixed(4) + '</td>' +
      '<td>' + d.min + 'B</td><td>' + d.n + '</td>' +
      '<td>' + r(d.p50_r) + '</td><td>' + r(d.p75_r) + '</td><td>' + r(d.p90_r) + '</td><td>' + r(d.max_r) + '</td>' +
      '<td>' + d.pct_near.toFixed(1) + '%</td>' +
      '<td>' + d.cv.toFixed(3) + '</td>' +
      '</tr>';
  });
  document.querySelector("#tbl tbody").innerHTML = h;

  // update header arrows
  document.querySelectorAll("th").forEach(function(th) {
    th.classList.remove("sorted");
    var arrow = th.querySelector(".arrow");
    if (arrow) arrow.textContent = "";
  });
  var cur = document.querySelector('th[data-key="' + sortKey + '"]');
  if (cur) {
    cur.classList.add("sorted");
    cur.setAttribute("data-dir", sortDir === 1 ? "asc" : "desc");
    var a = cur.querySelector(".arrow");
    if (a) a.textContent = sortDir === 1 ? "▲" : "▼";
  }
}

document.querySelectorAll("th[data-key]").forEach(function(th) {
  th.addEventListener("click", function() {
    var k = this.getAttribute("data-key");
    if (sortKey === k) {
      sortDir *= -1;
    } else {
      sortKey = k;
      sortDir = (k === "rmse_r" || k === "task") ? 1 : -1;
    }
    render();
  });
});

render();
</script>
